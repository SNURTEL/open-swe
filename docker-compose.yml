version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://open_swe:open_swe@postgres:5432/open_swe}
      SANDBOX_TYPE: ${SANDBOX_TYPE:-docker-container}
      LLM_MODEL_ID: ${LLM_MODEL_ID:-openai:gpt-5.5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_USER_ID: ${SLACK_BOT_USER_ID:-}
      SLACK_BOT_USERNAME: ${SLACK_BOT_USERNAME:-open-swe}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: open_swe
      POSTGRES_PASSWORD: open_swe
      POSTGRES_DB: open_swe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_swe -d open_swe"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v3.7.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app

volumes:
  postgres_data:
